name: Auto Merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # auto-merge ラベルが付いていて、かつ Draft でない PR のみ対象
    if: |
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.draft == false
    steps:
      - name: Check mergeable and merge
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // mergeable は計算中だと null が返るので、確定するまでポーリング
            let pr;
            for (let i = 0; i < 10; i++) {
              const res = await github.rest.pulls.get({ owner, repo, pull_number });
              pr = res.data;
              if (pr.mergeable !== null) break;
              core.info(`mergeable is still being calculated... (attempt ${i + 1})`);
              await new Promise(r => setTimeout(r, 3000));
            }

            core.info(`mergeable=${pr.mergeable}, mergeable_state=${pr.mergeable_state}`);

            if (pr.mergeable !== true) {
              core.warning(`Skip merge: PR is not mergeable (likely a conflict).`);
              return;
            }

            // マージ実行
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: 'merge',
            });
            core.info(`PR #${pull_number} merged successfully.`);

            // ヘッドブランチを削除（同一リポジトリのブランチのみ）
            const headRepoFullName = pr.head.repo ? pr.head.repo.full_name : null;
            const baseRepoFullName = `${owner}/${repo}`;
            if (headRepoFullName === baseRepoFullName) {
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pr.head.ref}`,
                });
                core.info(`Branch '${pr.head.ref}' deleted.`);
              } catch (e) {
                core.warning(`Failed to delete branch: ${e.message}`);
              }
            } else {
              core.info('Head branch is from a fork; skipping branch deletion.');
            }
