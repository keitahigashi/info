name: Auto Merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: write
  pull-requests: write

# 同じPRに対するワークフローは直列化＆古いほうをキャンセル
concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # 条件:
    #   - auto-merge ラベルが付いている
    #   - Draft でない
    #   - labeled イベントの場合は、付与されたラベルが auto-merge のときだけ
    if: |
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.draft == false &&
      (github.event.action != 'labeled' || github.event.label.name == 'auto-merge')
    steps:
      - name: Check mergeable and merge
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // 最新のPR状態を取得（mergeable は計算中だと null が返るのでポーリング）
            let pr;
            for (let i = 0; i < 10; i++) {
              const res = await github.rest.pulls.get({ owner, repo, pull_number });
              pr = res.data;
              if (pr.mergeable !== null) break;
              core.info(`mergeable is still being calculated... (attempt ${i + 1})`);
              await new Promise(r => setTimeout(r, 3000));
            }

            core.info(`state=${pr.state}, merged=${pr.merged}, mergeable=${pr.mergeable}, mergeable_state=${pr.mergeable_state}`);

            // 既にマージ済み or クローズ済みなら何もしない（二重起動対策）
            if (pr.merged) {
              core.info('PR is already merged. Skipping.');
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR is not open (state=${pr.state}). Skipping.`);
              return;
            }

            if (pr.mergeable !== true) {
              core.warning('Skip merge: PR is not mergeable (likely a conflict).');
              return;
            }

            // マージ実行
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: 'merge',
              });
              core.info(`PR #${pull_number} merged successfully.`);
            } catch (e) {
              // 405 Method Not Allowed: 競合などで既にマージできない状態になった
              // 409 Conflict: SHAミスマッチ等
              if (e.status === 405 || e.status === 409) {
                core.warning(`Merge skipped due to race condition: ${e.message}`);
                return;
              }
              throw e;
            }

            // ヘッドブランチを削除（同一リポジトリのブランチのみ）
            const headRepoFullName = pr.head.repo ? pr.head.repo.full_name : null;
            const baseRepoFullName = `${owner}/${repo}`;
            if (headRepoFullName === baseRepoFullName) {
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pr.head.ref}`,
                });
                core.info(`Branch '${pr.head.ref}' deleted.`);
              } catch (e) {
                // 既に削除されている場合（422）は無視
                if (e.status === 422) {
                  core.info('Branch is already deleted.');
                } else {
                  core.warning(`Failed to delete branch: ${e.message}`);
                }
              }
            } else {
              core.info('Head branch is from a fork; skipping branch deletion.');
            }
